<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>카카오톡 테마 다운로드</title>
    <meta name="description" content="Android/iOS 카카오톡 테마 다운로드 페이지" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
      <div class="orb orb-c"></div>
      <div class="noise"></div>
    </div>

    <main class="shell">
      <header class="topbar glass">
        <div class="dot dot-r" aria-hidden="true"></div>
        <div class="dot dot-y" aria-hidden="true"></div>
        <div class="dot dot-g" aria-hidden="true"></div>
        <div class="titlewrap">
          <div class="kicker">Theme Download</div>
          <h1 class="pagetitle" id="themeName">카카오톡 테마</h1>
        </div>
      </header>

      <section class="card glass">
        <div class="hero">
          <div class="badge" id="subtitle">Liquid Glass</div>
          <p class="desc" id="description">
            설정 파일을 불러오는 중입니다…
          </p>
        </div>

        <div class="cta">
          <a
            class="btn primary"
            id="androidBtn"
            href="#"
            rel="noopener noreferrer"
            target="_blank"
          >
            Android용 다운로드
          </a>
          <a
            class="btn"
            id="iosBtn"
            href="#"
            rel="noopener noreferrer"
            target="_blank"
          >
            iOS용 다운로드
          </a>
        </div>

        <div class="notes">
          <div class="note" id="androidNote"></div>
          <div class="note" id="iosNote"></div>
        </div>
      </section>

      <footer class="footer">
        <div class="footerText" id="footerNote"></div>
      </footer>
    </main>

    <div class="modal" id="guideModal" aria-hidden="true">
      <div class="modalBackdrop" id="guideBackdrop"></div>
      <div
        class="modalPanel glass"
        role="dialog"
        aria-modal="true"
        aria-labelledby="guideTitle"
      >
        <div class="modalHeader">
          <div class="modalTitle" id="guideTitle">적용 방법</div>
          <button class="iconBtn" type="button" id="guideCloseBtn" aria-label="닫기">
            ✕
          </button>
        </div>

        <ol class="steps" id="guideSteps"></ol>
        <div class="modalFootnote" id="guideFootnote"></div>

        <div class="modalCta">
          <a
            class="btn primary"
            id="guideDownloadBtn"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
          >
            다운로드 진행
          </a>
          <button class="btn" type="button" id="guideDoneBtn">확인</button>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
